palettes:
  - name: global_palette
    fixed-entries:
      - color: {index: 1, r: 0, g: 0, b: 0}           # black
      - color: {index: 2, r: 255, g: 255, b: 255}     # white
      - color: {index: 3, r: 255, g: 0, b: 255}       # magenta
      - color: {index: 4, r: 127, g: 127, b: 255}     # some color idk
      - color: {index: 5, r: 255, g: 127, b: 127}     # some color idk
    images: automatic

outputs:
  - type: c
    include-file: gfx.h
    palettes:
      - xlibc
